why_title: 一站式移动安全研究
why_1_title: 浏览器端操作
why_1_desc: 无需在终端、工具和输出之间来回切换。Grapefruit 将类浏览、线程检查、文件预览、网络监控全部整合到一个界面。
why_2_title: 跨平台支持
why_2_desc: 支持 macOS、Windows 和 Linux。一个现代浏览器就能访问你的研究工作空间。
why_3_title: Agent 技能
why_3_desc: 为 AI 编程代理扩展安全审计能力，轻松应对移动安全研究场景。
feat_hermes_title: Hermes 字节码
feat_hermes_desc: 独立的 React Native 字节码查看器。函数、字符串、反汇编和 AI 反编译，无需连接设备。
feat_r2_title: Radare2 分析
feat_r2_desc: 分屏展示控制流图、反汇编和反编译器。在浏览器中分析 DEX、原生二进制等格式。

theme_title: 暗色与亮色
theme_desc: 长时间研究也不累眼睛。

highlights_title: 核心功能
h_hook_title: 动态插桩
h_hook_desc: 实时拦截函数调用，轻松观察参数、返回值和调用栈
h_browse_title: 数据审查
h_browse_desc: 浏览类、方法、Keychain 和网络流量。数千条记录即时搜索
h_disasm_title: 分析与反编译
h_disasm_desc: 原生代码、DEX、Hermes 字节码同窗口查看。AI 自动生成可用的 Frida Hook 脚本

cta_title: 准备开始了吗？
cta_desc: Grapefruit 完全免费且开源。立即安装，开启安全研究。
