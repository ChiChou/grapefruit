name: Code Coverage

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - dev
    paths:
      - "src/**"
      - "agent/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/coverage.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "agent/**"
      - "package.json"
      - "bun.lock"

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies (skip prepare)
        run: bun install --ignore-scripts

      - name: Install and build agent
        run: bun install --cwd agent

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/

      - name: Post coverage summary
        run: |
          echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/lcov.info ]; then
            echo "Coverage report generated successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Coverage files:" >> $GITHUB_STEP_SUMMARY
            ls -la coverage/ >> $GITHUB_STEP_SUMMARY
          else
            echo "No coverage report generated" >> $GITHUB_STEP_SUMMARY
          fi
