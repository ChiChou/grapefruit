name: Code Coverage

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "src/**"
      - "agent/**"
      - "externals/**"
      - "wasi/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/coverage.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "agent/**"
      - "externals/**"
      - "wasi/**"
      - "package.json"
      - "bun.lock"

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache r2hermes WASM
        id: cache-wasm
        uses: actions/cache@v4
        with:
          path: externals/radare/r2hermes.wasm/dist
          key: r2hermes-wasm-${{ hashFiles('externals/radare/r2hermes/**', 'externals/radare/r2hermes.wasm/build.ts', 'externals/radare/r2hermes.wasm/hbc_wasm.c') }}

      - name: Setup wasi-sdk
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: |
          WASI_VERSION=32
          curl -fsSL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sdk-${WASI_VERSION}.0-x86_64-linux.tar.gz" | tar xz -C /opt
          echo "WASI_SDK_PATH=/opt/wasi-sdk-${WASI_VERSION}.0-x86_64-linux" >> $GITHUB_ENV

      - name: Build r2hermes WASM
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: bun externals/radare/r2hermes.wasm/build.ts

      - name: Cache radare2 WASI
        id: cache-r2-wasi
        uses: actions/cache@v4
        with:
          path: radare2.wasm
          key: r2-wasi-${{ hashFiles('scripts/fetch-r2-wasm.ts') }}

      - name: Fetch radare2 WASI
        if: steps.cache-r2-wasi.outputs.cache-hit != 'true'
        run: bun scripts/fetch-r2-wasm.ts

      - name: Install dependencies
        run: bun install

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/

      - name: Post coverage summary
        run: |
          echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/lcov.info ]; then
            echo "✅ Coverage report generated successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Coverage files:" >> $GITHUB_STEP_SUMMARY
            ls -la coverage/ >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No coverage report generated" >> $GITHUB_STEP_SUMMARY
          fi
