name: npm package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  cli:
    uses: ./.github/workflows/build-cli.yml

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: 'https://registry.npmjs.org'
          cache: "npm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache radare2 WASI
        id: cache-r2-wasi
        uses: actions/cache@v4
        with:
          path: radare2.wasm
          key: r2-wasi-${{ hashFiles('scripts/fetch-r2-wasm.ts') }}

      - name: Fetch radare2 WASI
        if: steps.cache-r2-wasi.outputs.cache-hit != 'true'
        run: bun scripts/fetch-r2-wasm.ts

      - name: Reset node_modules
        run: rm -rf node_modules

      - run: npm ci

      - name: Package
        run: npm pack

      - name: Upload Archive
        uses: actions/upload-artifact@v6
        with:
          name: igf.tgz
          path: build/igf-*.tgz

      - name: Publish to npm
        if: ${{ !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') }}
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    needs: [cli, npm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download CLI binaries
        uses: actions/download-artifact@v6
        with:
          name: cli-binaries
          path: cli

      - name: Download npm tarball
        uses: actions/download-artifact@v6
        with:
          name: igf.tgz
          path: npm

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cli/build/Release/igf-linux-x64
            cli/build/Release/igf-windows-x64.exe
            cli/build/Release/igf-darwin-x64
            cli/build/Release/igf-darwin-arm64
            npm/build/igf-*.tgz
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
