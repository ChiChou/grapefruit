name: Build Single Executable Tool

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Setup Node # some CI steps require node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache r2hermes WASM
        id: cache-wasm
        uses: actions/cache@v4
        with:
          path: externals/radare/r2hermes.wasm/dist
          key: r2hermes-wasm-${{ hashFiles('externals/radare/r2hermes/**', 'externals/radare/r2hermes.wasm/Makefile', 'externals/radare/r2hermes.wasm/hbc_wasm.c') }}

      - name: Setup Emscripten
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        uses: mymindstorm/setup-emsdk@v14

      - name: Build r2hermes WASM
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: make -C externals/radare/r2hermes.wasm

      - name: Reset node_modules
        run: rm -rf node_modules

      - name: Build binaries
        run: bun run build:all

      - name: Upload linux-x64
        uses: actions/upload-artifact@v6
        with:
          name: linux-x64
          path: build/Release/igf-linux-x64

      - name: Upload windows-x64
        uses: actions/upload-artifact@v6
        with:
          name: windows-x64
          path: build/Release/igf-windows-x64.exe

      - name: Upload darwin-x64
        uses: actions/upload-artifact@v6
        with:
          name: darwin-x64
          path: build/Release/igf-darwin-x64

      - name: Upload darwin-arm64
        uses: actions/upload-artifact@v6
        with:
          name: darwin-arm64
          path: build/Release/igf-darwin-arm64
