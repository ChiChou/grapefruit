name: Build Single Executable Tool

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - dev
    paths:
      - "src/**"
      - "agent/**"
      - "gui/**"
      - "scripts/**"
      - "externals/**"
      - "wasi/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsdown.config.ts"
      - ".github/workflows/build-cli.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Setup Node # some CI steps require node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache r2hermes WASM
        id: cache-wasm
        uses: actions/cache@v4
        with:
          path: externals/radare/r2hermes.wasm/dist
          key: r2hermes-wasm-${{ hashFiles('externals/radare/r2hermes/**', 'externals/radare/r2hermes.wasm/build.ts', 'externals/radare/r2hermes.wasm/hbc_wasm.c') }}

      - name: Setup wasi-sdk
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: |
          WASI_VERSION=32
          curl -fsSL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sdk-${WASI_VERSION}.0-x86_64-linux.tar.gz" | tar xz -C /opt
          echo "WASI_SDK_PATH=/opt/wasi-sdk-${WASI_VERSION}.0-x86_64-linux" >> $GITHUB_ENV

      - name: Build r2hermes WASM
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: bun externals/radare/r2hermes.wasm/build.ts

      - name: Cache radare2 WASI
        id: cache-r2-wasi
        uses: actions/cache@v4
        with:
          path: radare2.wasm
          key: r2-wasi-${{ hashFiles('scripts/fetch-r2-wasm.ts') }}

      - name: Fetch radare2 WASI
        if: steps.cache-r2-wasi.outputs.cache-hit != 'true'
        run: bun scripts/fetch-r2-wasm.ts

      - name: Reset node_modules
        run: rm -rf node_modules

      - name: Build binaries
        run: bun run build:all

      - name: Upload Binaries
        uses: actions/upload-artifact@v6
        with:
          name: cli-binaries
          path: |
            build/Release/igf-linux-x64
            build/Release/igf-windows-x64.exe
            build/Release/igf-darwin-x64
            build/Release/igf-darwin-arm64
